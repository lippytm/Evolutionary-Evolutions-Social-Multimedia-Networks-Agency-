name: Cross-Repo Ecosystem Sync

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      message:
        description: "Broadcast message to the ecosystem"
        required: false
        default: "Status update from Agency Hub"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Validate cross-platform config files
  # ---------------------------------------------------------------------------
  validate-configs:
    name: Validate Cross-Platform Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate repo-index.json
        run: |
          echo "Validating cross-platform/repo-index.json..."
          python3 -c "
          import json, sys
          with open('cross-platform/repo-index.json') as f:
              data = json.load(f)
          repos = data.get('repositories', [])
          print(f'  Found {len(repos)} repositories in index.')
          for r in repos:
              assert r.get('id'), f'Missing id in repo: {r}'
              assert r.get('name'), f'Missing name in repo: {r}'
              assert r.get('url'), f'Missing url in repo: {r}'
          print('  repo-index.json is valid.')
          "

      - name: Validate integration-map.json
        run: |
          echo "Validating cross-platform/integration-map.json..."
          python3 -c "
          import json
          with open('cross-platform/integration-map.json') as f:
              data = json.load(f)
          channels = data.get('communication_channels', [])
          print(f'  Found {len(channels)} communication channels.')
          for c in channels:
              assert c.get('name'), f'Missing name in channel: {c}'
              assert c.get('type'), f'Missing type in channel: {c}'
          print('  integration-map.json is valid.')
          "

      - name: Validate api-bridge-config.json
        run: |
          echo "Validating cross-platform/api-bridge-config.json..."
          python3 -c "
          import json
          with open('cross-platform/api-bridge-config.json') as f:
              data = json.load(f)
          platforms = data.get('platforms', {})
          print(f'  Found {len(platforms)} platform configurations.')
          print('  api-bridge-config.json is valid.')
          "

  # ---------------------------------------------------------------------------
  # Job 2: Report ecosystem status
  # ---------------------------------------------------------------------------
  ecosystem-status:
    name: Ecosystem Status Report
    runs-on: ubuntu-latest
    needs: validate-configs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate ecosystem status report
        id: status
        run: |
          echo "## 🌐 lippytm Ecosystem Status Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📦 Repository Index" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json
          with open('cross-platform/repo-index.json') as f:
              data = json.load(f)
          repos = data.get('repositories', [])
          print(f'| # | Name | Role | Tags |')
          print(f'|---|------|------|------|')
          for i, r in enumerate(repos, 1):
              tags = ', '.join(r.get('tags', []))
              print(f'| {i} | [{r[\"name\"]}]({r[\"url\"]}) | {r[\"role\"]} | {tags} |')
          " >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📡 Communication Channels" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json
          with open('cross-platform/integration-map.json') as f:
              data = json.load(f)
          channels = data.get('communication_channels', [])
          print(f'| Channel | Type | Direction |')
          print(f'|---------|------|-----------|')
          for c in channels:
              print(f'| {c[\"name\"]} | {c[\"type\"]} | {c[\"direction\"]} |')
          " >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job 3: Notify lippytm.ai hub (via repository_dispatch)
  # ---------------------------------------------------------------------------
  notify-hub:
    name: Notify lippytm.ai Hub
    runs-on: ubuntu-latest
    needs: ecosystem-status
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Send repository_dispatch to lippytm.ai
        env:
          HUB_TOKEN: ${{ secrets.HUB_DISPATCH_TOKEN }}
        run: |
          if [ -z "$HUB_TOKEN" ]; then
            echo "HUB_DISPATCH_TOKEN secret not set — skipping hub notification."
            echo "To enable: add a GitHub PAT with repo scope as the HUB_DISPATCH_TOKEN secret."
            exit 0
          fi

          PAYLOAD=$(python3 -c "
          import json
          payload = {
              'event_type': 'agency_hub_update',
              'client_payload': {
                  'source_repo': 'Evolutionary-Evolutions-Social-Multimedia-Networks-Agency-',
                  'message': '${{ github.event.inputs.message || 'Push update from Agency Hub' }}',
                  'sha': '${{ github.sha }}',
                  'ref': '${{ github.ref }}'
              }
          }
          print(json.dumps(payload))
          ")

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${HUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/lippytm/lippytm.ai/dispatches \
            -d "$PAYLOAD")

          if [ "$HTTP_STATUS" = "204" ]; then
            echo "Hub notification sent successfully (HTTP $HTTP_STATUS)."
          else
            echo "Hub notification returned HTTP $HTTP_STATUS (may need HUB_DISPATCH_TOKEN configured)."
          fi
